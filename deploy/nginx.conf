server {
    listen 80;
    server_name _;  # замените на ваш домен или IP

    # Максимальный размер загружаемых файлов
    client_max_body_size 10M;

    # Проксирование всего трафика на Uvicorn
    # FastAPI сам отдаёт статику фронтенда и SPA-роутинг
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты (APScheduler и long-polling)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # index.html не кэшировать — чтобы WebView всегда получал актуальный бандл
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Кэширование статических ассетов фронтенда
    location /assets/ {
        proxy_pass http://127.0.0.1:8000/assets/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
